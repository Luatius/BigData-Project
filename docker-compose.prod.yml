services:
  mongodb:
    image: mongo:latest
    container_name: bigdata-mongodb-prod
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongodb_prod_data:/data/db
    networks:
      - bigdata-network

  scraper:
    image: ghcr.io/luatius/bigdata-scraper:latest
    container_name: bigdata-scraper-prod
    depends_on:
      - mongodb
    networks:
      - bigdata-network
    profiles:
      - scraper

  jupyter:
    image: jupyter/scipy-notebook:latest
    container_name: bigdata-jupyter-prod
    restart: always
    ports:
      - "8888:8888"
    environment:
      JUPYTER_TOKEN: ${JUPYTER_PASSWORD}
      MONGO_HOST: mongodb
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - jupyter_notebooks:/home/jovyan/notebooks
    networks:
      - bigdata-network
    depends_on:
      - mongodb

volumes:
  mongodb_prod_data:
  jupyter_notebooks:

networks:
  bigdata-network:
