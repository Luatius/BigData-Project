services:
  mongodb:
    image: mongo:latest
    container_name: bigdata-mongodb-prod
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - ./data/mongodb:/data/db
    networks:
      - bigdata-network

  scraper:
    image: ghcr.io/luatius/bigdata-scraper:latest
    container_name: bigdata-scraper-prod
    environment:
      MONGO_HOST: mongodb
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
    depends_on:
      - mongodb
    networks:
      - bigdata-network
    profiles:
      - scraper

  jupyter:
    image: jupyter/scipy-notebook:latest
    container_name: bigdata-jupyter-prod
    restart: always
    ports:
      - "8888:8888"
    environment:
      JUPYTER_TOKEN: ${JUPYTER_PASSWORD}
      MONGO_HOST: mongodb
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - .:/home/jovyan/work
    networks:
      - bigdata-network
    depends_on:
      - mongodb

  mongo-express:
    image: mongo-express:latest
    container_name: bigdata-mongo-express-prod
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD}
    networks:
      - bigdata-network
    depends_on:
      - mongodb

networks:
  bigdata-network:
