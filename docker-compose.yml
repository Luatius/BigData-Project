version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: bigdata-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-secret}
    volumes:
      - mongodb_data:/data/db
    networks:
      - bigdata-network

  scraper:
    build:
      context: .
      dockerfile: docker/scraper/Dockerfile
    container_name: bigdata-scraper
    depends_on:
      - mongodb
    networks:
      - bigdata-network
    profiles:
      - scraper

volumes:
  mongodb_data:

networks:
  bigdata-network:
