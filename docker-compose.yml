services:
  mongodb:
    image: mongo:latest
    container_name: bigdata-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-secret}
    volumes:
      - mongodb_data:/data/db
    networks:
      - bigdata-network

  scraper:
    build:
      context: .
      dockerfile: docker/scraper/Dockerfile
    container_name: bigdata-scraper
    depends_on:
      - mongodb
    networks:
      - bigdata-network
    profiles:
      - scraper

  jupyter:
    image: jupyter/scipy-notebook:latest
    container_name: bigdata-jupyter
    ports:
      - "8888:8888"
    environment:
      JUPYTER_TOKEN: ${JUPYTER_PASSWORD}
      MONGO_HOST: mongodb
      MONGO_USER: ${MONGO_USER:-admin}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-secret}
    volumes:
      - .:/home/jovyan/work
    networks:
      - bigdata-network
    depends_on:
      - mongodb

  mongo-express:
    image: mongo-express:latest
    container_name: bigdata-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-secret}
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-admin}
    networks:
      - bigdata-network
    depends_on:
      - mongodb

volumes:
  mongodb_data:

networks:
  bigdata-network:
